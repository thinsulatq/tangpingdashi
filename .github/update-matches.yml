name: Update Football Matches
on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点（北京时间8点）自动更新
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch matches data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python << 'EOF'
          import requests
          import json
          from datetime import datetime, timedelta

          API_KEY = "${{ secrets.FOOTBALL_API_KEY }}"
          headers = {"X-Auth-Token": API_KEY}
          competitions = ["PL", "PD", "SA", "BL1"]  # 英超、西甲、意甲、德甲
          matches = []

          # 获取今天和未来7天的比赛
          today = datetime.now().strftime("%Y-%m-%d")
          next_week = (datetime.now() + timedelta(days=7)).strftime("%Y-%m-%d")

          for comp in competitions:
              url = f"https://api.football-data.org/v4/competitions/{comp}/matches?dateFrom={today}&dateTo={next_week}"
              response = requests.get(url, headers=headers)
              if response.status_code == 200:
                  data = response.json()
                  for match in data.get("matches", []):
                      matches.append({
                          "league": comp,
                          "homeTeam": match["homeTeam"]["name"],
                          "awayTeam": match["awayTeam"]["name"],
                          "date": match["utcDate"],
                          "status": match["status"]
                      })

          # 保存为JSON文件
          with open("matches.json", "w", encoding="utf-8") as f:
              json.dump(matches, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update matches data [skip ci]"
          git push
